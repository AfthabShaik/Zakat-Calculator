<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramadan Zakat Calculator</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="overlay">

<div class="container">

<h1>🌙 Ramadan Zakat Calculator</h1>

<div class="input-group">
<label>Gold Value (₹)</label>
<input type="number" id="gold">
</div>

<div class="input-group">
<label>Silver Value (₹)</label>
<input type="number" id="silver">
</div>

<div class="input-group">
<label>Cash (₹)</label>
<input type="number" id="cash">
</div>

<div class="input-group">
<label>Business Assets (₹)</label>
<input type="number" id="business">
</div>

<div class="input-group">
<label>Debts / Liabilities (₹)</label>
<input type="number" id="debts">
</div>

<button onclick="calculateZakat()">Calculate Zakat</button>

<div class="result-box">

<h2 id="zakatResult"></h2>

<div id="breakdown"></div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
